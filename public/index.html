<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 LeafyLife | Houseplant Guide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
    :root {
        --primary: #2e7d32;
        --primary-hover: #1b5e20;
    }
    
    body { background-color: #f1f8e9; }

    .hero {
        padding: 4rem 0;
        text-align: center;
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                    url('https://images.unsplash.com/photo-1466781783364-391eaf50cf2a?w=1200');
        background-size: cover;
        background-position: center;
        color: white;
        margin-bottom: 3rem;
    }

    /* Target the grid to be exactly 3 columns on desktops */
    #plant-list.grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* Forces 3 columns */
        gap: 2rem; /* Increases spacing between cards */
    }

    /* Responsive adjustment for tablets/phones */
    @media (max-width: 992px) {
        #plant-list.grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
    @media (max-width: 600px) {
        #plant-list.grid {
            grid-template-columns: 1fr;
        }
    }

    .plant-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
        border: none;
        background: white;
        padding: 0; /* Let image fill the top */
        border-radius: 1rem;
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        height: 100%; /* Ensures all cards in a row are same height */
        display: flex;
        flex-direction: column;
    }

    .plant-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 20px 30px rgba(0,0,0,0.15);
    }

    .card-image {
        height: 300px; /* Made the image taller */
        width: 100%;
        object-fit: cover;
        border-radius: 1rem 1rem 0 0;
    }

    .card-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .difficulty-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
        background: #e8f5e9;
        color: var(--primary);
        margin-bottom: 0.75rem;
    }
    </style>
</head>
<body>
    <section class="hero">
        <div class="container">
            <h1>LeafyLife</h1>
            <p>Your digital greenhouse for indoor plant mastery.</p>
        </div>
    </section>

    <main class="container">
        <div id="plant-list" class="grid">
            </div>
    </main>

    <script>
        async function loadPlants() {
            const response = await fetch('/api/plants');
            const plants = await response.json();
            const list = document.getElementById('plant-list');

            list.innerHTML = plants.map(plant => `
                <article class="plant-card" onclick="window.location.href='/plants/${plant.id}'">
                    <img src="${plant.image}" alt="${plant.name}" class="card-image">
                    <div class="card-content">
                        <div>
                            <span class="difficulty-badge">${plant.difficulty}</span>
                            <h3 style="margin: 0; color: #1b5e20;">${plant.name}</h3>
                            <p style="font-style: italic; color: #666; font-size: 0.9rem;">${plant.scientificName}</p>
                        </div>
                        <footer style="margin-top: 1rem; padding: 0; background: transparent; border: none;">
                            <button class="outline" style="width: 100%; border-color: var(--primary); color: var(--primary);">
                                View Care Details
                            </button>
                        </footer>
                    </div>
                </article>
            `).join('');
        }
        loadPlants();
    </script>
</body>
</html>
