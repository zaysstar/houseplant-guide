<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Care Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-hover: #1b5e20;
        }
        body { background-color: #f1f8e9; padding-top: 2rem; }
        
        .detail-card {
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 1.5rem;
            overflow: hidden;
            background: white;
        }

        .plant-hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 400px;
        }

        .info-section {
            padding: 2rem;
        }

        .care-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f9fbf7;
            border-radius: 12px;
        }

        .difficulty-tag {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="container">
    <nav>
        <ul>
            <li><a href="/" class="secondary" style="text-decoration: none;">← Back to Greenhouse</a></li>
        </ul>
        <ul>
            <li><strong>LeafyLife Care Guide</strong></li>
        </ul>
    </nav>

    <main id="plant-content">
        <article aria-busy="true" class="detail-card"></article>
    </main>

    <script>
        async function loadPlantDetail() {
            const pathParts = window.location.pathname.split('/');
            const plantId = pathParts[pathParts.length - 1];

            const response = await fetch('/api/plants');
            const plants = await response.json();
            const plant = plants.find(p => p.id === plantId);

            const content = document.getElementById('plant-content');

            if (plant) {
                document.title = `${plant.name} | LeafyLife`;
                content.innerHTML = `
                    <div class="detail-card">
                        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));">
                            <div>
                                <img src="${plant.image}" alt="${plant.name}" class="plant-hero-img">
                            </div>
                            <div class="info-section">
                                <hgroup>
                                    <h1>${plant.name}</h1>
                                    <p><i>${plant.scientificName}</i></p>
                                </hgroup>
                                
                                <div class="care-item">
                                    <span style="font-size: 1.5rem;">🛠</span>
                                    <div>
                                        <strong>Difficulty Level</strong><br>
                                        <span class="difficulty-tag">${plant.difficulty}</span>
                                    </div>
                                </div>

                                <div class="care-item">
                                    <span style="font-size: 1.5rem;">💧</span>
                                    <div>
                                        <strong>Watering Schedule</strong><br>
                                        <span>${plant.watering}</span>
                                    </div>
                                </div>

                                <div class="care-item">
                                    <span style="font-size: 1.5rem;">☀️</span>
                                    <div>
                                        <strong>Light Requirement</strong><br>
                                        <span>Bright, Indirect Light</span>
                                    </div>
                                </div>

                                <footer style="margin-top: 2rem;">
                                    <p><small>Looking for more tips? Check back for our Unit 2 update where we'll add a community database!</small></p>
                                </footer>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                window.location.href = '/404.html';
            }
        }
        loadPlantDetail();
    </script>
</body>
</html>
